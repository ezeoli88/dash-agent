name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build shared + dashboard
        run: npm run build:shared && npm run build:dashboard

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: packages/dashboard/dist

  build-binary:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: agent-board
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x64
            binary: agent-board
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary: agent-board
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win-x64
            binary: agent-board.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/server-rs/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('packages/server-rs/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Build release binary
        working-directory: packages/server-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: frontend-dist

      - name: Prepare platform directory
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.platform }}
          cp packages/server-rs/target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.platform }}/
          cp -r frontend-dist dist/${{ matrix.platform }}/public

      - name: Create platform ZIP (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cd dist/${{ matrix.platform }} && zip -r ../${{ matrix.platform }}.zip .

      - name: Create platform ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.platform }}/*" -DestinationPath "dist/${{ matrix.platform }}.zip"

      - name: Upload platform ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}.zip

  upload-r2:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform ZIPs
        uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LINUX_X64_SHA=$(sha256sum dist/linux-x64.zip | awk '{print $1}')
          MACOS_X64_SHA=$(sha256sum dist/macos-x64.zip | awk '{print $1}')
          MACOS_ARM64_SHA=$(sha256sum dist/macos-arm64.zip | awk '{print $1}')
          WIN_X64_SHA=$(sha256sum dist/win-x64.zip | awk '{print $1}')
          printf '%s\n' \
            '{' \
            "  \"version\": \"${VERSION}\"," \
            '  "platforms": {' \
            "    \"linux-x64\": { \"zip\": \"linux-x64/agent-board.zip\", \"sha256\": \"${LINUX_X64_SHA}\" }," \
            "    \"macos-x64\": { \"zip\": \"macos-x64/agent-board.zip\", \"sha256\": \"${MACOS_X64_SHA}\" }," \
            "    \"macos-arm64\": { \"zip\": \"macos-arm64/agent-board.zip\", \"sha256\": \"${MACOS_ARM64_SHA}\" }," \
            "    \"win-x64\": { \"zip\": \"win-x64/agent-board.zip\", \"sha256\": \"${WIN_X64_SHA}\" }" \
            '  }' \
            '}' > dist/manifest.json

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb

      - name: Configure rclone for R2
        run: |
          rclone config create r2 s3 \
            provider=Cloudflare \
            access_key_id=${{ secrets.R2_ACCESS_KEY_ID }} \
            secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }} \
            endpoint=https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            acl=private

      - name: Upload binaries to R2
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          rclone copy dist/manifest.json "r2:${BUCKET}/binaries/v${VERSION}/"
          rclone copyto dist/linux-x64.zip "r2:${BUCKET}/binaries/v${VERSION}/linux-x64/agent-board.zip"
          rclone copyto dist/macos-x64.zip "r2:${BUCKET}/binaries/v${VERSION}/macos-x64/agent-board.zip"
          rclone copyto dist/macos-arm64.zip "r2:${BUCKET}/binaries/v${VERSION}/macos-arm64/agent-board.zip"
          rclone copyto dist/win-x64.zip "r2:${BUCKET}/binaries/v${VERSION}/win-x64/agent-board.zip"

      - name: Upload latest.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          echo "{\"tag\":\"v${VERSION}\",\"version\":\"${VERSION}\"}" > latest.json
          rclone copyto latest.json "r2:${BUCKET}/latest.json"

  publish-npm:
    needs: upload-r2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish CLI package
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
